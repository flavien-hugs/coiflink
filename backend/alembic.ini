# Configuration Alembic — migrations PostgreSQL CoifLink (issue #3).
#
# Le DSN de connexion est lu **depuis l'environnement** (`DATABASE_URL`) par
# `migrations/env.py` : aucun identifiant n'est stocké ici (PRD §11 ; injection
# des secrets réels en #5). `sqlalchemy.url` est donc laissé vide volontairement.

[alembic]
# Emplacement des migrations (relatif à backend/, où l'on lance `alembic`).
script_location = migrations

# Permet d'importer le paquet `coiflink_api` depuis la racine de backend/.
prepend_sys_path = .

# Séparateur de chemins (dépendant de l'OS) — utilisé pour `prepend_sys_path`
# et les chemins de versions.
path_separator = os

# Gabarit de nommage des fichiers de migration : préfixe horodaté lisible.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# DSN volontairement vide : fourni par l'environnement via migrations/env.py.
sqlalchemy.url =


# --------------------------------------------------------------------------- #
# Journalisation. Les logs ne doivent jamais dumper de données (PII — PRD §11.3).
# --------------------------------------------------------------------------- #
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
